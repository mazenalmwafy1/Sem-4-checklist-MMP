<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Med Study Schedule</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0f14;
    --surface: #16181f;
    --surface2: #1e2029;
    --border: rgba(255,255,255,0.07);
    --text: #f0efe8;
    --muted: #7a7d8a;
    --accent: #c8f060;
    --accent2: #60d0f0;
    --anatomy: #a78bfa;
    --physio: #34d399;
    --pharma: #fbbf24;
    --clinical: #f87171;
    --pathology: #fb923c;
    --psychiatry: #e879f9;
    --histology: #38bdf8;
    --radius: 12px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Decorative bg */
  body::before {
    content: '';
    position: fixed;
    top: -200px; left: -200px;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(200,240,96,0.06) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }
  body::after {
    content: '';
    position: fixed;
    bottom: -200px; right: -200px;
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(96,208,240,0.05) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  /* Header */
  header {
    position: relative; z-index: 10;
    padding: 3rem 2rem 2rem;
    max-width: 1100px;
    margin: 0 auto;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 1rem;
    border-bottom: 1px solid var(--border);
  }

  .logo-area h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(2rem, 5vw, 3.2rem);
    font-weight: 800;
    letter-spacing: -0.03em;
    line-height: 1;
    color: var(--text);
  }
  .logo-area h1 span { color: var(--accent); }
  .logo-area p {
    margin-top: 0.5rem;
    color: var(--muted);
    font-size: 0.9rem;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .stats-bar {
    display: flex;
    gap: 1.5rem;
    align-items: center;
  }
  .stat-item {
    text-align: center;
  }
  .stat-item .num {
    font-family: 'Syne', sans-serif;
    font-size: 1.8rem;
    font-weight: 700;
    color: var(--accent);
  }
  .stat-item .lbl {
    font-size: 0.75rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.07em;
  }
  .stat-div { width: 1px; height: 40px; background: var(--border); }

  /* Progress summary */
  .progress-summary {
    position: relative; z-index: 10;
    max-width: 1100px;
    margin: 2rem auto 0;
    padding: 0 2rem;
  }
  .prog-bar-wrap { background: var(--surface); border-radius: 999px; height: 6px; overflow: hidden; margin-bottom: 0.5rem; }
  .prog-bar-fill { height: 100%; border-radius: 999px; background: linear-gradient(90deg, var(--accent), var(--accent2)); transition: width 0.5s ease; }
  .prog-label { font-size: 0.8rem; color: var(--muted); display: flex; justify-content: space-between; }

  /* Subject filter pills */
  .filters {
    position: relative; z-index: 10;
    max-width: 1100px;
    margin: 2rem auto 0;
    padding: 0 2rem;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
  }
  .filter-label { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-right: 4px; }
  .pill {
    padding: 5px 14px;
    border-radius: 999px;
    font-size: 0.78rem;
    font-weight: 500;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.03em;
  }
  .pill:hover { border-color: rgba(255,255,255,0.2); color: var(--text); }
  .pill.active { background: var(--surface2); color: var(--text); border-color: rgba(255,255,255,0.2); }
  .pill[data-subject="all"].active { background: var(--accent); color: #0e0f14; border-color: var(--accent); }

  /* Week sections */
  .weeks {
    position: relative; z-index: 10;
    max-width: 1100px;
    margin: 2rem auto 4rem;
    padding: 0 2rem;
    display: flex;
    flex-direction: column;
    gap: 2.5rem;
  }

  .week-block { }

  .week-header {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-bottom: 1rem;
  }
  .week-num {
    font-family: 'Syne', sans-serif;
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--accent);
    background: rgba(200,240,96,0.08);
    border: 1px solid rgba(200,240,96,0.2);
    padding: 3px 10px;
    border-radius: 999px;
  }
  .week-line { flex: 1; height: 1px; background: var(--border); }
  .week-prog-count { font-size: 0.78rem; color: var(--muted); white-space: nowrap; }

  /* Lecture grid */
  .lecture-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
    gap: 10px;
  }

  .lecture-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1rem 1.1rem;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s, transform 0.1s;
    position: relative;
    overflow: hidden;
  }
  .lecture-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 3px;
    height: 100%;
    border-radius: 3px 0 0 3px;
    background: var(--subject-color, var(--muted));
    opacity: 0.7;
  }
  .lecture-card:hover { border-color: rgba(255,255,255,0.15); background: var(--surface2); transform: translateY(-1px); }
  .lecture-card.done { background: rgba(200,240,96,0.04); border-color: rgba(200,240,96,0.15); }
  .lecture-card.done::before { opacity: 1; }

  .card-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
  }
  .subject-tag {
    font-size: 0.68rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--subject-color, var(--muted));
  }
  .card-num {
    font-family: 'Syne', sans-serif;
    font-size: 0.7rem;
    color: var(--muted);
  }

  .card-title {
    font-size: 0.9rem;
    font-weight: 500;
    color: var(--text);
    line-height: 1.4;
    margin-bottom: 10px;
  }

  .card-checks {
    display: flex;
    gap: 6px;
  }
  .check-btn {
    flex: 1;
    padding: 5px 6px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-size: 0.68rem;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
  }
  .check-btn:hover { border-color: rgba(255,255,255,0.2); color: var(--text); }
  .check-btn.checked-study { background: rgba(52,211,153,0.12); border-color: rgba(52,211,153,0.3); color: #34d399; }
  .check-btn.checked-revision { background: rgba(251,191,36,0.12); border-color: rgba(251,191,36,0.3); color: #fbbf24; }
  .check-btn.checked-mcq { background: rgba(168,139,250,0.12); border-color: rgba(168,139,250,0.3); color: #a78bfa; }

  /* Practical section */
  .practical-section {
    position: relative; z-index: 10;
    max-width: 1100px;
    margin: 0 auto 4rem;
    padding: 0 2rem;
  }
  .section-title {
    font-family: 'Syne', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--accent2);
    margin-bottom: 1.5rem;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  .practical-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
    gap: 10px;
  }
  .practical-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 0.9rem 1rem;
    position: relative;
    overflow: hidden;
  }
  .practical-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 3px; height: 100%;
    background: var(--accent2);
    opacity: 0.5;
    border-radius: 3px 0 0 3px;
  }
  .prac-top { display: flex; justify-content: space-between; margin-bottom: 6px; }
  .prac-tag { font-size: 0.68rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--subject-color, var(--accent2)); }
  .prac-num { font-size: 0.7rem; color: var(--muted); }
  .prac-title { font-size: 0.88rem; color: var(--text); line-height: 1.4; margin-bottom: 8px; }
  .prac-checks { display: flex; gap: 6px; }

  /* Legend */
  .legend {
    position: relative; z-index: 10;
    max-width: 1100px;
    margin: 0 auto 2rem;
    padding: 0 2rem;
    display: flex;
    gap: 1.5rem;
    flex-wrap: wrap;
    align-items: center;
  }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 0.78rem; color: var(--muted); }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; }

  /* Toast */
  .toast {
    position: fixed; bottom: 2rem; right: 2rem; z-index: 9999;
    background: var(--accent); color: #0e0f14;
    padding: 10px 18px; border-radius: 8px;
    font-size: 0.85rem; font-weight: 600;
    transform: translateY(80px); opacity: 0;
    transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
    pointer-events: none;
  }
  .toast.show { transform: translateY(0); opacity: 1; }

  @media (max-width: 600px) {
    header, .filters, .weeks, .practical-section, .progress-summary, .legend { padding: 0 1rem; }
    .stats-bar { gap: 1rem; }
    .lecture-grid, .practical-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <div class="logo-area">
    <h1>Med <span>Schedule</span></h1>
    <p>Neuroscience Block &mdash; 10 Weeks</p>
  </div>
  <div class="stats-bar">
    <div class="stat-item">
      <div class="num" id="total-done">0</div>
      <div class="lbl">Studied</div>
    </div>
    <div class="stat-div"></div>
    <div class="stat-item">
      <div class="num" id="total-cards">59</div>
      <div class="lbl">Lectures</div>
    </div>
    <div class="stat-div"></div>
    <div class="stat-item">
      <div class="num" id="pct">0%</div>
      <div class="lbl">Progress</div>
    </div>
  </div>
</header>

<div class="progress-summary">
  <div class="prog-bar-wrap"><div class="prog-bar-fill" id="main-prog" style="width:0%"></div></div>
  <div class="prog-label"><span>Overall completion</span><span id="prog-text">0 / 59 lectures studied</span></div>
</div>


<div style="max-width:1100px;margin:1rem auto 0;padding:0 2rem;display:flex;gap:10px;flex-wrap:wrap;">
  <input id="searchBox" placeholder="Search lecture..." style="flex:1;min-width:220px;padding:10px;border-radius:8px;border:1px solid rgba(255,255,255,.1);background:#16181f;color:white;">
  <button onclick="resetProgress()" style="padding:10px 14px;border-radius:8px;border:none;cursor:pointer;">Reset Progress</button>
</div>
<div class="filters">

  <span class="filter-label">Filter:</span>
  <button class="pill active" data-subject="all" onclick="filterSubject('all',this)">All</button>
  <button class="pill" data-subject="Anatomy" onclick="filterSubject('Anatomy',this)">Anatomy</button>
  <button class="pill" data-subject="Physiology" onclick="filterSubject('Physiology',this)">Physiology</button>
  <button class="pill" data-subject="Pharmacology" onclick="filterSubject('Pharmacology',this)">Pharmacology</button>
  <button class="pill" data-subject="Clinical" onclick="filterSubject('Clinical',this)">Clinical</button>
  <button class="pill" data-subject="Pathology" onclick="filterSubject('Pathology',this)">Pathology</button>
  <button class="pill" data-subject="Psychiatry" onclick="filterSubject('Psychiatry',this)">Psychiatry</button>
  <button class="pill" data-subject="Histology" onclick="filterSubject('Histology',this)">Histology</button>
</div>


<div id="subject-stats" style="max-width:1100px;margin:1rem auto;padding:0 2rem;"></div>

<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:#34d399"></div>Study</div>
  <div class="legend-item"><div class="legend-dot" style="background:#fbbf24"></div>Revision</div>
  <div class="legend-item"><div class="legend-dot" style="background:#a78bfa"></div>MCQ</div>
  <div class="legend-item" style="margin-left:auto;font-size:0.75rem">Click any button to mark progress &bull; State saved in browser</div>
</div>

<div class="weeks" id="weeks-container"></div>

<div class="practical-section">
  <div class="section-title">Practicals</div>
  <div class="practical-grid" id="prac-grid"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const subjectColors = {

  Physiology: 'var(--physio)',
  Pharmacology: 'var(--pharma)',
  Clinical: 'var(--clinical)',

const lectures = [
  // Week 1
  {id:1,week:1,subject:'Anatomy',title:'Development of neural tube & spinal cord'},
  {id:2,week:1,subject:'Anatomy',title:'Development of vertebral column'},

  {id:14,week:2,subject:'Clinical',title:'Low back pain'},
  // Week 3
  {id:15,week:3,subject:'Anatomy',title:'Bony orbit & extra ocular muscles'},
  {id:16,week:3,subject:'Physiology',title:'Refractive apparatus'},
  {id:17,week:3,subject:'Anatomy',title:'Vessels & nerves of orbit'},
  {id:18,week:3,subject:'Physiology',title:'Photo transduction'},
  {id:19,week:3,subject:'Anatomy',title:'Brainstem & 4th ventricle'},
  {id:20,week:3,subject:'Clinical',title:'Disorders of visual development'},
  // Week 4
  {id:21,week:4,subject:'Anatomy',title:'Anatomy of the ear'},
  {id:22,week:4,subject:'Anatomy',title:'Naso & nasopharynx'},
  {id:23,week:4,subject:'Pathology',title:'Tonsillitis & otitis media'},
  {id:24,week:4,subject:'Psychiatry',title:'Attention and information'},
  {id:25,week:4,subject:'Physiology',title:'Vestibular system'},
  {id:26,week:4,subject:'Physiology',title:'Mechanism of hearing'},
  // Week 5
  {id:27,week:5,subject:'Anatomy',title:'Descending motor pathways'},
  {id:28,week:5,subject:'Psychiatry',title:'Neurocognitive function of brain'},
  {id:29,week:5,subject:'Anatomy',title:'Blood supply of brain'},
  {id:30,week:5,subject:'Physiology',title:'Alpha & gamma motorneurons'},
  {id:31,week:5,subject:'Pathology',title:'Cerebro-vascular strokes'},
  {id:32,week:5,subject:'Physiology',title:'Pyramidal & extrapyramidal system'},
  // Week 6
  {id:33,week:6,subject:'Anatomy',title:'Anatomy of cerebellum'},
  {id:34,week:6,subject:'Physiology',title:'Physiology of cerebellum'},
  {id:35,week:6,subject:'Histology',title:'Cells and myelination of NS'},
  {id:36,week:6,subject:'Pathology',title:'Demyelinating cell'},
  {id:37,week:6,subject:'Anatomy',title:'Cranial nerve (1, 5, 7)'},
  {id:38,week:6,subject:'Clinical',title:'Multiple sclerosis'},
  {id:39,week:6,subject:'Psychiatry',title:'Depression and management'},
  // Week 7
  {id:40,week:7,subject:'Anatomy',title:'Anatomy of internal structure of brain'},
  {id:41,week:7,subject:'Anatomy',title:'CN (9–12) & taste pathway'},
  {id:42,week:7,subject:'Physiology',title:'Basal ganglia'},
  {id:43,week:7,subject:'Clinical',title:'Gait'},
  {id:44,week:7,subject:'Clinical',title:'Parkinsonism'},
  {id:45,week:7,subject:'Pharmacology',title:'Anti-Parkinson drugs'},
  // Week 8
  {id:46,week:8,subject:'Anatomy',title:'Limbic system & thalamus'},
  {id:47,week:8,subject:'Psychiatry',title:'Schizophrenia'},
  {id:48,week:8,subject:'Pharmacology',title:'Anti-psychotic'},
  {id:49,week:8,subject:'Physiology',title:'Neurotransmitters'},
  // Week 9
  {id:50,week:9,subject:'Anatomy',title:'Cervical fascia & post triangle of neck'},
  {id:51,week:9,subject:'Physiology',title:'Synaptic transmission'},
  {id:52,week:9,subject:'Histology',title:'Skeletal muscle & motor end plate'},
  {id:53,week:9,subject:'Clinical',title:'Overuse injury & stress fracture'},
  {id:54,week:9,subject:'Anatomy',title:'Larynx'},
  {id:55,week:9,subject:'Anatomy',title:'Functional anatomy of foot'},
  // Week 10
  {id:56,week:10,subject:'Anatomy',title:'Blood supply & lymph of head & neck'},
  {id:57,week:10,subject:'Pharmacology',title:'General anesthesia'},
  {id:58,week:10,subject:'Physiology',title:'Sleep and consciousness'},
  {id:59,week:10,subject:'Clinical',title:'Management of head injury'},
];

const practicals = [
  {id:'p1',week:1,subject:'Anatomy',title:'Anatomy of skull'},
  {id:'p2',week:2,subject:'Anatomy',title:'Anatomy of skull & C vertebrae'},
  {id:'p3',week:2,subject:'Pharmacology',title:'Local anesthetic'},
  {id:'p4',week:3,subject:'Anatomy',title:'Brainstem & cerebellum'},
  {id:'p5',week:3,subject:'Physiology',title:'Visual acuity & color vision'},
  {id:'p6',week:4,subject:'Anatomy',title:'Lobes & cortical areas'},
  {id:'p7',week:4,subject:'Physiology',title:'Hearing'},
  {id:'p8',week:5,subject:'Anatomy',title:'Mandible & parotid gland'},
  {id:'p9',week:5,subject:'Pharmacology',title:'Drug acting on eye'},
  {id:'p10',week:6,subject:'Anatomy',title:'Face and scalp'},
  {id:'p11',week:6,subject:'Physiology',title:'Human reflexes'},
  {id:'p12',week:7,subject:'Anatomy',title:'Sections of brain'},
  {id:'p13',week:8,subject:'Anatomy',title:'Temporal & infratemporal fossae'},
  {id:'p14',week:8,subject:'Histology',title:'Brainstem sections'},
  {id:'p15',week:9,subject:'Anatomy',title:'Anterior triangle of knee'},
  {id:'p16',week:9,subject:'Pharmacology',title:'Drug dilutions'},
  {id:'p17',week:10,subject:'Anatomy',title:'Sagittal sections of H&N'},
];

// State from localStorage
function getState() {
  try { return JSON.parse(localStorage.getItem('medSchedule') || '{}'); } catch(e) { return {}; }
}
function setState(s) { try { localStorage.setItem('medSchedule', JSON.stringify(s)); } catch(e) {} }

let state = getState();
let activeFilter = 'all'; let searchTerm='';

function resetProgress(){
  if(confirm('Reset all progress?')){
    localStorage.removeItem('medSchedule');
    state={};
    renderAll();
  }
}

document.addEventListener('input', function(e){
  if(e.target.id==='searchBox'){
    window.searchTerm=e.target.value.toLowerCase();
    renderAll();
  }
});


function normalizeSubject(s) {
  const map = { 'physio': 'Physiology', 'physiology': 'Physiology', 'pharma': 'Pharmacology', 'pharmacology': 'Pharmacology', 'clincal': 'Clinical', 'clinical': 'Clinical', 'patho': 'Pathology', 'pathology': 'Pathology', 'histology': 'Histology', 'anatomy': 'Anatomy', 'psychiatry': 'Psychiatry', 'antomy': 'Anatomy' };
  return map[s.toLowerCase()] || s;
}

function getColor(subject) {
  return subjectColors[normalizeSubject(subject)] || 'var(--muted)';
}

function toggle(id, type) {
  const key = `${id}_${type}`;
  state[key] = !state[key];
  setState(state);
  renderAll();
  showToast(state[key] ? `Marked as ${type}!` : `${type} unmarked`);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(window._toastTimer);
  window._toastTimer = setTimeout(() => t.classList.remove('show'), 2000);
}

function filterSubject(subj, btn) {
  activeFilter = subj;
  document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  renderAll();
}

function isDone(id) { return state[`${id}_study`]; }

function cardHTML(lec) {
  const norm = normalizeSubject(lec.subject);
  const color = getColor(lec.subject);
  const s = state[`${lec.id}_study`];
  const r = state[`${lec.id}_revision`];
  const m = state[`${lec.id}_mcq`];
  const done = s ? 'done' : '';
  return `
    <div class="lecture-card ${done}" style="--subject-color:${color}" data-subject="${norm}">
      <div class="card-top">
        <span class="subject-tag">${norm}</span>
        <span class="card-num">#${lec.id}</span>
      </div>
      <div class="card-title">${lec.title}</div>
      <div class="card-checks">
        <button class="check-btn ${s?'checked-study':''}" onclick="toggle(${lec.id},'study')">✓ Study</button>
        <button class="check-btn ${r?'checked-revision':''}" onclick="toggle(${lec.id},'revision')">↻ Revision</button>
        <button class="check-btn ${m?'checked-mcq':''}" onclick="toggle(${lec.id},'mcq')">? MCQ</button>
      </div>
    </div>
  `;
}

function pracCardHTML(p) {
  const norm = normalizeSubject(p.subject);
  const color = getColor(p.subject);
  const s = state[`${p.id}_study`];
  const r = state[`${p.id}_revision`];
  return `
    <div class="practical-card" style="--subject-color:${color}" data-subject="${norm}">
      <div class="prac-top">
        <span class="prac-tag">${norm}</span>
        <span class="prac-num">W${p.week}</span>
      </div>
      <div class="prac-title">${p.title}</div>
      <div class="prac-checks">
        <button class="check-btn ${s?'checked-study':''}" onclick="toggle('${p.id}','study')">✓ Study</button>
        <button class="check-btn ${r?'checked-revision':''}" onclick="toggle('${p.id}','revision')">↻ Revision</button>
      </div>
    </div>
  `;
}

function renderAll() {
  const weeks = [...new Set(lectures.map(l => l.week))].sort((a,b)=>a-b);
  const container = document.getElementById('weeks-container');
  container.innerHTML = '';

  weeks.forEach(wk => {
    const wkLectures = lectures.filter(l => l.week === wk);
    let filtered = activeFilter === 'all' ? wkLectures : wkLectures.filter(l => normalizeSubject(l.subject) === activeFilter);
    if(searchTerm){filtered = filtered.filter(l=>l.title.toLowerCase().includes(searchTerm));}
    if (filtered.length === 0) return;

    const studied = wkLectures.filter(l => state[`${l.id}_study`]).length;

    const block = document.createElement('div');
    block.className = 'week-block';
    block.innerHTML = `
      <div class="week-header">
        <span class="week-num">Week ${wk}</span>
        <div class="week-line"></div>
        <span class="week-prog-count">${studied}/${wkLectures.length} studied</span>
      </div>
      <div class="lecture-grid">${filtered.map(l => cardHTML(l)).join('')}</div>
    `;
    container.appendChild(block);
  });

  // Practicals
  const pracGrid = document.getElementById('prac-grid');
  const filteredPrac = activeFilter === 'all' ? practicals : practicals.filter(p => normalizeSubject(p.subject) === activeFilter);
  pracGrid.innerHTML = filteredPrac.map(p => pracCardHTML(p)).join('');

  // Update stats
  const totalStudied = lectures.filter(l => state[`${l.id}_study`]).length;
  const pct = Math.round((totalStudied / lectures.length) * 100);
  document.getElementById('total-done').textContent = totalStudied;
  document.getElementById('pct').textContent = pct + '%';
  document.getElementById('main-prog').style.width = pct + '%';
  
  document.getElementById('prog-text').textContent = `${totalStudied} / ${lectures.length} lectures studied`;
  const subjects=[...new Set(lectures.map(l=>l.subject))];
  document.getElementById('subject-stats').innerHTML=subjects.map(s=>{
    const total=lectures.filter(l=>l.subject===s).length;
    const done=lectures.filter(l=>l.subject===s && state[`${l.id}_study`]).length;
    return `<div style="display:inline-block;margin:4px;padding:8px 12px;background:#16181f;border-radius:8px">${s}: ${done}/${total}</div>`;
  }).join('');

}

renderAll();
</script>
</body>
</html>
